services:
  backend:
    build: ./backend
    ports:
      - '3000:3000'
    volumes:
      - ./data:/app/data
    environment:
      PORT: 3000
      VISITS_PER_TREE: 10
      DB_PATH: /app/data/visits.db
      NODE_ENV: production
      ADMIN_SECRET: ${ADMIN_SECRET:-local-dev-admin-secret}
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "require(\"http\").get(\"http://localhost:3000/api/v1/config\",r=>process.exit(r.statusCode===200?0:1)).on(\"error\",()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build: ./frontend
    ports:
      - '8080:80'
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
